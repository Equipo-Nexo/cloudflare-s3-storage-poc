spring:
  application:
    name: s3_cloudflare_poc
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
  datasource:
    url: jdbc:mysql://localhost:3306/s3_poc?createDatabaseIfNotExist=true
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
